<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Demo Auction UI</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; padding: 20px; }
        .widget {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .title { font-weight: bold; margin-bottom: 10px; }
        .log { font-family: monospace; white-space: pre-line; }
        .input-row { margin-bottom: 10px; }
        input[type="text"] {
            padding: 6px;
            width: 250px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            padding: 6px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<!-- FORMULARUL NOU -->
<div class="widget">
    <div class="title">Send a product to Seller Service</div>

    <div class="input-row">
        <input id="productInput" type="text" placeholder="Product name">
        <button onclick="sendProduct()">Send</button>
    </div>

    <div id="send-status" style="color: green; font-size: 14px;"></div>
</div>

<div class="widget">
    <div class="title">Seller Service</div>
    <div id="seller-log" class="log"></div>
</div>

<div class="widget">
    <div class="title">Bidder Service</div>
    <div id="bidder-log" class="log"></div>
</div>

<div class="widget">
    <div class="title">Auction Manager</div>
    <div id="manager-log" class="log"></div>
</div>

<script>
    // Trimite produsul către seller-service
    function sendProduct() {
        const desc = document.getElementById("productInput").value;
        const status = document.getElementById("send-status");

        if (!desc.trim()) {
            status.style.color = "red";
            status.textContent = "Enter a product name.";
            return;
        }

        fetch("/ui/send-to-seller?desc=" + encodeURIComponent(desc), {
            method: "POST"
        })
        .then(r => r.text())
        .then(t => {
            status.style.color = "green";
            status.textContent = "Product sent!";
            document.getElementById("productInput").value = "";
        })
        .catch(err => {
            status.style.color = "red";
            status.textContent = "Error sending.";
            console.error(err);
        });
    }

    // Conectare la stream-urile SSE
    function connectStream(endpoint, elementId) {
        const eventSource = new EventSource(endpoint);

        eventSource.onmessage = function(event) {
            const el = document.getElementById(elementId);
            el.textContent += event.data + "\n";
        };

        eventSource.onerror = function() {
            console.log("Stream error, retrying...");
        };
    }

    connectStream("/stream/seller", "seller-log");
    connectStream("/stream/bidder", "bidder-log");
    connectStream("/stream/manager", "manager-log");
</script>

</body>
</html>
